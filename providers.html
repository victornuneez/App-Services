<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/providers.css">
    <link rel="icon" type="image/png" href="images/logo-serviYA.png">
    <!--MEJORA LIGHTHOUSE #1 - SEO: meta description agregada -->
    <meta name="description" content="Encontra proveedores de servicios locales verificados en ServiYA. Albaniles, pintores, electricistas y más en Asunción.">
</head>
<body>
    <!-- NAVBAR -->
    <header id="navbar"></header>

    <!-- CONTENIDO -->
    <main class="container">
        
        <!--SUBTITULO DE LA PAGINA-->
        <section class="providers-page">
            <h2>Todos los proveedores</h2>

            <!-- MEJORA LIGHTHOUSE #2 - ACCESIBILIDAD: label asociado al input de busqueda -->
            <label for="search-input" class="visually-hidden">Buscar proveedor por categoria o nombre</label>
            
            <!--BUSCADOR DE PROVEEDORES-->
            <input type="text" id="search-input" placeholder="Buscar">

            <!--CARDS DE LOS PROVEEDORES (aria-live indica a los lectores de pantalla que anuncien los cambios de resultados)-->
            <div id="providers-list" class="cards" aria-live="polite">
                
            </div>

        </section>
    </main>
    <!--FOOTER-->
    <footer id="footer"></footer>

    <!-- JS -->
    <script src="js/main.js"></script>
    <script src="js/providers.js"></script>

</body>
</html>
