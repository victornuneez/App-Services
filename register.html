<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrate</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <header id="navbar"></header>
    
    <main class="container">

        <section class="register">
            <h2>Registra tu servicio</h2>

            <form action="" id="register-form">
                <label for="name">Nombre Completo:</label>
                <input type="text" id="name" name="name" placeholder="Nombre y Apellido" required>

                <label for="service">Categoria:</label>
                <input type="text" id="service" name="service" placeholder="Servicio" required>

                <label for="phone">Telefono:</label>
                <input type="text" id="phone" name="phone" placeholder="Telefono" required>

                <label for="location">Ubicacion:</label>
                <input type="text" id="location" name="location" placeholder="Ubicacion" required>

                <label for="description">Descripcion</label>
                <textarea name="description" id="description" placeholder="Breve descripcion de tu servicio"></textarea>

                <button type="submit" class="btn-primary">Enviar</button>
            
            </form>

        </section>

    </main>

    <footer id="footer"></footer>

    <script src="js/register.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
