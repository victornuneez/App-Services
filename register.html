<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrate</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="icon" type="image/png" href="images/logo-serviYa.png">
</head>
<body>
    <header id="navbar"></header>
    
    <main class="container">

        <section class="register">
            <h2>Registra tu servicio</h2>

            <form action="" id="register-form">
                <label for="name">Nombre Completo:</label>
                <input type="text" id="name" name="name" maxlength="20" placeholder="Nombre y Apellido" required>

                <label for="service">Categoria:</label>
                <input type="text" id="service" name="service" maxlength="10" placeholder="Servicio" required>

                <label for="zone">Zonas de servicio:</label>
                <input type="text" id="zone" maxlength="40" placeholder="Hasta que zonas ofreces tus servicios">

                <label for="payments">Metodos de cobranza:</label>
                <input type="text" id="payments" maxlength="15" placeholder="Ej: efectivo, transferencias, etc">

                <label for="price_estimated">Precios de servicios:</label>
                <input type="text"  id="price_estimated" maxlength="30" placeholder="Precio/precios de servicio">

                <label for="phone">Telefono:</label>
                <input type="tel" id="phone" name="phone" maxlength="15" placeholder="Ej:+595975123456" required>

                <label for="location">Ubicacion:</label>
                <input type="text" id="location" name="location" maxlength="20" placeholder="Ubicacion" required>

                <label for="description">Descripcion:</label>
                <textarea name="description" id="description" maxlength="40" placeholder="Breve descripcion de tu servicio"></textarea>

                <button type="submit" class="btn-primary">Enviar</button>
            
            </form>

        </section>

    </main>

    <footer id="footer"></footer>

    <script src="js/register.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
